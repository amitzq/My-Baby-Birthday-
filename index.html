<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fbc2eb,#a18cd1);
color:white;
text-align:center;
overflow:hidden;
}

/* slide */

.slide{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* button */

button{
padding:14px 28px;
font-size:16px;
border-radius:12px;
background:transparent;
color:white;
border:2px solid white;
box-shadow:0 0 10px rgba(255,255,255,0.6);
cursor:pointer;
}

/* 3D glowing hearts */

.glow-heart{
position:fixed;
bottom:-40px;
color:#ff4da6;
pointer-events:none;

text-shadow:
0 0 5px #ff4da6,
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;

animation:floatUp 7s linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(0.5) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.2) rotate(360deg);
opacity:0;
}

}

/* rose petals */

.rose{
position:fixed;
top:-30px;
pointer-events:none;
animation:roseFall linear forwards;
}

@keyframes roseFall{

0%{
transform:translateY(-30px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(120vh) rotate(360deg);
opacity:0;
}

}

</style>

</head>

<body>

<div class="slide">

<h1>💖 Birthday Surprise 💖</h1>

<button>Tap To Continue</button>

</div>

<script>

/* 3D glowing hearts */

setInterval(()=>{

let heart=document.createElement("div")

heart.className="glow-heart"

heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),7000)

},600)



/* rose petals */

setInterval(()=>{

let rose=document.createElement("div")

rose.className="rose"

rose.innerHTML="🌹"

rose.style.left=Math.random()*100+"vw"

rose.style.fontSize=(18+Math.random()*20)+"px"

rose.style.animationDuration=(5+Math.random()*4)+"s"

document.body.appendChild(rose)

setTimeout(()=>rose.remove(),9000)

},800)

</script>

</body>
</html>
